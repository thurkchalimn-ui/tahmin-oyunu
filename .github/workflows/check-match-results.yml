name: Bildirim, Hatırlatma ve Canlı Skor Kontrolü

# ÖNEMLİ: Burada bilinçli olarak "schedule" (GitHub'ın kendi zamanlayıcısı) YOK.
# Sadece cron-job.org'un her 5 dakikada bir gönderdiği workflow_dispatch isteğiyle
# çalışır. Daha önce hem GitHub'ın kendi zamanlayıcısı hem cron-job.org aynı anda
# aktifken, ikisi zaman zaman çakışıp script'i eş zamanlı iki kez çalıştırıyor ve
# bu da her bildirimin İKİ KEZ gönderilmesine yol açıyordu. Tek tetikleyici
# kaynağı bırakarak bu çakışma tamamen ortadan kaldırılır.
on:
  workflow_dispatch:

jobs:
  check-results:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: automation
    steps:
      - name: Kodu indir
        uses: actions/checkout@v4

      - name: Node.js kur
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Bağımlılıkları kur
        run: npm install

      - name: Bildirim/hatırlatma/canlı skor scriptini çalıştır
        env:
          FIREBASE_SERVICE_ACCOUNT_KEY: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_KEY }}
          API_FOOTBALL_KEY: ${{ secrets.API_FOOTBALL_KEY }}
        run: npm run check-results
